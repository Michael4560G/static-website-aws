<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michael's AWS Project</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            border-top: 5px solid #ff9900; /* הצבע של AWS */
        }
        h1 {
            color: #232f3e;
            margin-bottom: 10px;
        }
        .status {
            display: inline-block;
            background: #e7f6e7;
            color: #2e7d32;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            margin-top: 15px;
        }
        p {
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Michael's Web Server</h1>
        <p>ברוכים הבאים למטלת ה-CloudFront שלי!</p>
        <p>האתר הזה מוגש דרך <strong>Amazon CloudFront</strong> ומעודכן אוטומטית בעזרת <strong>GitHub Actions</strong>.</p>
        
        <div class="status">
            ● המערכת פועלת בהצלחה
        </div>
    </div>

</body>
</html>
