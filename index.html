<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michael's AWS Lab</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #232f3e 0%, #1a1a1a 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            max-width: 500px;
        }
        h1 {
            color: #ff9900; /* הצבע הרשמי של AWS */
            margin-bottom: 1rem;
            font-size: 2.5rem;
        }
        h2 {
            color: #00fbff;
            font-weight: 300;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .badge {
            background-color: #4CAF50;
            color: white;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.9rem;
            display: inline-block;
            margin-top: 10px;
        }
        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AWS Cloud Assignment</h1>
        <h2>Student Name: Michael</h2>
        <p>This static website is successfully hosted on <strong>Amazon S3</strong>, distributed via <strong>CloudFront</strong>, and deployed automatically using <strong>GitHub Actions</strong>.</p>
        <div class="badge">Status: Successfully Deployed! 🚀</div>
        
        <div class="footer">
            Built with ❤️ using AWS Infrastructure as Code principles
        </div>
    </div>
</body>
</html>
